  <h1>ELI10 Academy VIP 🔓</h1>

  </div>

  <!-- PARTIE CLIENT NORMALE -->
  <div id="clientPanel" class="card">
    <h2>Accès Niveau 2</h2>
    <input type="text" id="codeInput" placeholder="COLLE TON CODE VIP ICI">
    <button onclick="verifierCode()">Déverrouiller</button>
    <p id="msg" style="margin-top:10px; font-weight:700; text-align:center;"></p>
  </div>

  <!-- COURS + QUIZ + IA = MASQUÉ JUSQU'AU DÉBLOCAGE -->
  <div id="coursVIP" class="hidden"></div>

<script>
// === BASE DE DONNÉES ===
const coursData = [
  {id: 2, titre: "HTML de Base", desc: "Structure d'une page : `<!DOCTYPE>`, `<html>`, `<head>`, `<body>`.", quiz: {q: "Quelle balise met le titre dans l'onglet?", a: ["<p>", "<title>", "<h1>"], correct: 1}},
  {id: 3, titre: "CSS Moderne", desc: "Flexbox = aligner. Grid = quadriller.", quiz: {q: "Pour centrer avec Flexbox on utilise?", a: ["text-align", "justify-content", "justify-content"], correct: 2}},
];
//... colle ici Leçon 4 à 10 comme avant...

const aiBrain = {"flexbox": "Flexbox sert à aligner...", "grid": "Grid sert à faire un tableau...", "default": "Teste sur ton code et reviens me dire."};

// === LOGIQUE CODE ALÉATOIRE ===
let codesVIP = JSON.parse(localStorage.getItem('eli10_codes')) || [];

function genererCodes() {
  for (let i = 0; i < 20; i++) {
    const code = 'ELI10-' + Math.random().toString(36).substring(2, 8).toUpperCase();
    codesVIP.push({code: code, utilise: false});
  }
  localStorage.setItem('eli10_codes', JSON.stringify(codesVIP));
  afficherCodes();
  alert('20 codes générés!');
}

function afficherCodes() {
  document.getElementById('listeCodes').innerHTML = codesVIP.map(c => `${c.code} - ${c.utilise? '✅ UTILISÉ' : '🟢 DISPO'}`).join('<br>');
}

function exporterCSV() {
  const csv = 'Code,Statut\n' + codesVIP.map(c => `${c.code},${c.utilise? 'UTILISE' : 'DISPO'}`).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'codes_ELI10.csv'; a.click();
}

function verifierCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const msg = document.getElementById('msg');
  const codeObj = codesVIP.find(c => c.code === code);

  if (codeObj &&!codeObj.utilise) {
    codeObj.utilise = true;
    localStorage.setItem('eli10_codes', JSON.stringify(codesVIP));
    localStorage.setItem('eli10_unlocked', 'true');
    msg.style.color = '#4ade80';
    msg.textContent = '✅ Accès débloqué à vie!';
    loadCours();
  } else if (codeObj && codeObj.utilise) {
    msg.style.color = '#facc15';
    msg.textContent = '⚠️ Ce code a déjà été utilisé.';
  } else {
    msg.style.color = '#f87171';
    msg.textContent = '❌ Code incorrect.';
  }
}

// === AFFICHAGE COURS + QUIZ + IA = IDENTIQUE V4.0 ===
function loadCours() { /*... colle ici la fonction loadCours de V4.0... */ document.getElementById('clientPanel').classList.add('hidden'); document.getElementById('coursVIP').classList.remove('hidden'); }
function checkQuiz(id, choix) { /*... colle ici... */ }
function askAI() { /*... colle ici... */ }

// === LANCEMENT ===
if (window.location.search.includes('admin=1')) {
  document.getElementById('adminPanel').classList.remove('hidden');
  afficherCodes();
}
if (localStorage.getItem('eli10_unlocked') === 'true') {
  loadCours();
}
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
