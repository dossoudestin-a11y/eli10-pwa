<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESTIN TEST</title>
<style>
body{background:#0a0f1e;color:#fff;font-family:'Segoe UI';display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.box{background:rgba(255,255,255,.1);padding:24px;border-radius:16px;width:90%;max-width:400px;text-align:center}
input,button{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:0;font-size:1rem}
button{background:#FFD700;color:#000;font-weight:700;cursor:pointer}
#msg{margin-top:12px;min-height:22px}
</style>
</head>
<body>
<div class="box">
  <h1>DESTIN TEST</h1>
  <input id="codeInput" placeholder="COLLE DESTIN-001">
  <button id="unlockBtn">Activer Mon Accès</button>
  <div id="msg"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  alert('1. JS Chargé ✅'); // TEST 1

  const VALID_CODES = ["DESTIN-001", "DESTIN-002"];
  const btn = document.getElementById('unlockBtn');
  const msg = document.getElementById('msg');

  alert('2. Bouton Trouvé ✅'); // TEST 2

  btn.onclick = () => {
    alert('3. CLIC DÉTECTÉ ✅'); // TEST 3 = SI TU VOIS PAS ÇA, C’EST TON TEL QUI BLOQUE

    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    msg.textContent = 'Code tapé: ' + code;
    
    if(VALID_CODES.includes(code)){
      msg.textContent = "✅ Bienvenue à l’Académie!";
      alert('4. CODE BON ✅'); 
    } else {
      msg.textContent = "❌ Code incorrect. Tu as mis: " + code;
      alert('4. CODE MAUVAIS ❌');
    }
  };
});
</script>
</body>
</html>
