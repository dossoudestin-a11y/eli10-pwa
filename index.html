<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DESTIN ACADEMIE V31.3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#fff;background: radial-gradient(ellipse at 20% 10%, rgba(127,90,240,.4) 0%, transparent 50%),radial-gradient(ellipse at 80% 90%, rgba(255,215,0,.3) 0%, transparent 50%),linear-gradient(135deg, #0a0f1e 0%, #1a1f3a 50%, #2a1a4a 100%);min-height:100vh}
.app{width:100%;max-width:800px;margin:0 auto;padding:20px;min-height:100vh}
.logo{width:90px;height:90px;margin:20px auto;background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:3rem;font-weight:900;color:#000;box-shadow:0 0 30px rgba(255,215,0,.6)}
h1{text-align:center;font-size:1.8rem;margin:0 0 15px;background:linear-gradient(90deg,#FFD700,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h2{font-size:1.5rem;color:#FFD700;margin:22px 0 12px;border-bottom:3px solid rgba(255,215,0,.4);padding-bottom:8px}
input{width:100%;padding:16px;border-radius:14px;border:2px solid rgba(255,215,0,.4);font-size:1.05rem;font-weight:700;background:rgba(0,0,0,.6);color:#fff;text-align:center;margin-bottom:12px;text-transform:uppercase}
button{width:100%;padding:16px;border-radius:14px;border:0;font-size:1.1rem;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);color:#000;cursor:pointer;touch-action:manipulation;-webkit-appearance:none}
button:active{transform:scale(.96)}
.btn-back{width:auto;padding:12px 18px;background:rgba(255,255,255,.1);color:#fff;font-size:.95rem;border:1px solid rgba(255,255,255,.2);margin-bottom:15px}
.page{display:none}
.page.active{display:block}
.lock-box{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,215,0,.3);padding:28px;border-radius:24px;margin-top:30px}
.lesson{background:linear-gradient(135deg,rgba(127,90,240,.35),rgba(0,0,0,.35));padding:16px;border-radius:14px;margin-top:12px;border:1px solid rgba(127,90,240,.5);cursor:pointer}
.error{color:#FF5252;text-align:center;margin-top:8px;font-weight:700;display:none}
.success{color:#69F0AE;text-align:center;margin-top:8px;font-weight:700;display:none}
.prix{color:#FFD700;font-size:1.05rem;text-align:center;margin-bottom:15px}
</style>
</head>
<body>
<div class="app">

  <!-- PAS DE FORM DU TOUT -->
  <div id="lock" class="page active">
    <div class="lock-box">
      <div class="logo">DP</div>
      <h1>DESTIN ACADEMIE</h1>
      <p class="prix">💰 Accès: 2000F - Code CEO</p>
      <input id="code" placeholder="DESTIN-001" autocomplete="off">
      <button id="btnActiver" type="button">Débloquer l’Accès ✨</button>
      <div id="error" class="error"></div>
      <div id="success" class="success">✅ Validé!</div>
    </div>
  </div>

  <div id="home" class="page">
    <div class="logo" style="width:70px;height:70px;font-size:2.2rem">DP</div>
    <h1>Salut <span id="userCode"></span> ✨</h1>
    <p style="text-align:center;opacity:.9">Bouton 100% réparé CEO 💪</p>
    <div class="lesson" onclick="alert('Leçon 2 ouverte')">Leçon 2: Apprentissage Machine 🍼</div>
  </div>

</div>

<script>
const CODES = ["DESTIN-001","DESTIN-002","DESTIN-003","DESTIN-004","DESTIN-005"];

// BOUTON 100% JS = PLUS DE BUG SAFARI
const btn = document.getElementById('btnActiver');
const input = document.getElementById('code');

btn.addEventListener('click', activer);
input.addEventListener('keypress', e=>{if(e.key==='Enter')activer();});

function activer(){
  let code = input.value.trim().toUpperCase();
  let err = document.getElementById('error'); 
  let ok = document.getElementById('success');
  err.style.display='none'; 
  ok.style.display='none';
  
  if(code === ''){
    err.textContent="❌ Tape un code d'abord.";
    err.style.display='block';
    return;
  }
  if(!CODES.includes(code)){
    err.textContent="❌ Code faux. Utilise DESTIN-001";
    err.style.display='block';
    return;
  }
  if(localStorage.getItem('destin_code')){
    err.textContent="❌ Ce téléphone a déjà un code.";
    err.style.display='block';
    return;
  }
  
  localStorage.setItem('destin_code',code);
  ok.style.display='block';
  
  setTimeout(()=>{
    document.getElementById('userCode').textContent=code;
    document.getElementById('lock').classList.remove('active');
    document.getElementById('home').classList.add('active');
  },700);
}

// Auto-login si déjà activé
if(localStorage.getItem('destin_code')){
  document.getElementById('userCode').textContent=localStorage.getItem('destin_code');
  document.getElementById('lock').classList.remove('active');
  document.getElementById('home').classList.add('active');
}
</script>
</body>
</html>
