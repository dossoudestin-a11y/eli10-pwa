<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELI10 Academy</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6D28D9">
  <style>
    body{font-family:system-ui;background:#0F172A;color:#fff;margin:0;padding:24px;text-align:center}
    .card{background:#1E293B;border-radius:16px;padding:24px;margin-top:20px;border:1px solid #6D28D9}
    button{background:#FBBF24;color:#000;border:none;padding:14px 24px;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;width:100%;margin-top:12px}
    button:disabled{background:#475569;color:#94A3B8;cursor:not-allowed}
    input{width:100%;padding:12px;border-radius:8px;border:1px solid #475569;background:#0F172A;color:#fff;margin-top:8px}
    .locked{opacity:0.5}
  </style>
</head>
<body>
  <h1>🚀 ELI10 Academy</h1>
  <div class="card">
    <h2>Leçon 1: Base de la PWA</h2>
    <p>Une PWA = Progressive Web App. Elle s'installe, marche hors-ligne, et fait pro. C'est ça qui te fait passer de 0 à 15,000 FCFA.</p>
    
    <h3>QCM de validation</h3>
    <p>Que signifie le 'P' de PWA ?</p>
    <input id="q1" placeholder="Tape ta réponse ici">
    <button onclick="checkQCM()">Valider la Leçon 1</button>
    <p id="result"></p>
  </div>

  <div class="card locked">
    <h2>🔒 Leçon 2: Déploiement</h2>
    <p>Termine la Leçon 1 pour déverrouiller.</p>
    <button disabled>Verrouillé</button>
  </div>

<script>
  function checkQCM(){
    const rep = document.getElementById('q1').value.toLowerCase();
    const res = document.getElementById('result');
    if(rep.includes('progressive')){
      res.innerText = '✅ Correct ! Leçon 1 validée. Tu es un CEO.';
      res.style.color = '#FBBF24';
    } else {
      res.innerText = '❌ Faux. Le "P" = Progressive. Réessaie.';
      res.style.color = '#F87171';
    }
  }
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
