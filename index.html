<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIA ACADEMIE V22</title>
<style>
* {box-sizing: border-box;}
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:#fff;
  /* FOND HYPER CLASSE 👑 BLEU NUIT + OR + VIOLET */
  background: radial-gradient(ellipse at 20% 10%, rgba(127,90,240,.4) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 90%, rgba(255,215,0,.3) 0%, transparent 50%),
              linear-gradient(135deg, #0a0f1e 0%, #1a1f3a 50%, #2a1a4a 100%);
  min-height: 100vh;
}
.app{width:100%;max-width:500px;margin:20px auto;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,215,0,.3);padding:24px;border-radius:24px;box-shadow:0 20px 60px rgba(127,90,240,.4)}
.logo{width:90px;height:90px;margin:0 auto 15px;background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:3rem;font-weight:900;color:#000;box-shadow:0 0 30px rgba(255,215,0,.6)}
h1{text-align:center;font-size:1.7rem;margin:0 0 10px;background:linear-gradient(90deg,#FFD700,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
form{display:grid;gap:12px}
input{width:100%;padding:16px;border-radius:14px;border:2px solid rgba(255,215,0,.4);font-size:1.05rem;font-weight:700;background:rgba(0,0,0,.5);color:#fff;text-transform:uppercase;text-align:center}
input:invalid{border-color:#FF5252}
input:valid{border-color:#69F0AE}
button{width:100%;padding:16px;border-radius:14px;border:0;font-size:1.1rem;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);color:#000;cursor:pointer}
button:disabled{opacity:.4;cursor:not-allowed}
.hidden{display:none}
/* LA MAGIE CEO : Si le form est VALIDE = On cache lock et on montre app */
form:valid #lock{display:none}
form:valid ~ #app{display:block}
#app{display:none}
.lesson{background:linear-gradient(135deg,rgba(127,90,240,.35),rgba(0,0,0,.35));padding:16px;border-radius:14px;margin-top:12px;border:1px solid rgba(127,90,240,.5)}
#destinReply{background:linear-gradient(135deg,rgba(127,90,240,.25),rgba(255,215,0,.15));padding:18px;border-radius:16px;margin-top:15px;font-size:1.15rem;line-height:1.9;border:1px solid rgba(127,90,240,.4)}
#destinReply b{color:#FFD700;font-size:1.2rem}
</style>
</head>
<body>
<div class="app">

  <form id="form" onsubmit="return false">
    <div id="lock">
      <div class="logo">DP</div>
      <h1>LIA ACADEMIE</h1>
      <p style="text-align:center;opacity:.9;margin:0">Code secret exact 👇</p>
      <!-- PATTERN = Le code exact. Si c'est pas ça, le bouton reste mort -->
      <input id="code" name="code" placeholder="DESTIN-001" required pattern="DESTIN-001" autocomplete="off">
      <button type="submit" formaction="#app">Activer Mon Accès ✨</button>
      <p style="text-align:center;margin-top:8px;font-size:.9rem;opacity:.7">Tape EXACTEMENT: DESTIN-001</p>
    </div>
  </form>

  <div id="app">
    <div class="logo" style="width:70px;height:70px;font-size:2.2rem">DP</div>
    <h1>Salut, je suis LIA ✨</h1>
    <p style="text-align:center;opacity:.9">Clique une leçon 👇</p>

    <div class="lesson" onclick="r('LIA ✨:</b> 👶 Coucou! Imagine un robot bébé 🍼. Si tu lui montres 100 photos de chats, il apprend! Après il dit tout seul: `Ah! Ça c’est un chat!` C’est ça l’IA.')"><b>Leçon 2</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 📚 Machine Learning = `La machine va à l’école`! Comme toi. Maman te montre la lettre `A` 50 fois. Après tu reconnais `A` partout.')"><b>Leçon 3</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 🧠 L’ordi a un `cerveau` plein d’ampoules 💡. Une crie `moustaches!`, une autre `miaule!`. Ensemble = `C’est un chat!`')"><b>Leçon 4</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 😊 Moi c’est LIA! J’ai lu tous les livres. Je devine le mot d’après quand tu parles. C’est un jeu!')"><b>Leçon 5</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 👑🐶 Tu me dis `dessine un chien roi` et POUF! J’ai vu des millions de dessins avant. Je suis une artiste magique.')"><b>Leçon 6</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 🍌 Attention! Si je vois seulement des bananes jaunes, je crois que toutes sont jaunes. L’IA copie bêtement.')"><b>Leçon 7</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 🗣️ Parle-moi comme à ton ami. Dis: `LIA s’il te plaît, dessine un soleil jaune qui rigole` 😊')"><b>Leçon 8</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 🇧🇯 Au Bénin je peux t’aider pour tes devoirs, écrire pour vendre, ou traduire Français <> Fon.')"><b>Leçon 9</b></div>
    <div class="lesson" onclick="r('LIA ✨:</b> 🚀 L’IA ne prend PAS ta place! Mais toi + LIA = Tu deviens un super-héros de ta classe.')"><b>Leçon 10</b></div>
    
    <div id="destinReply">👋 Coucou! Clique `Leçon 2` pour commencer 😊</div>
  </div>
</div>

<script>
// 1 SEULE LIGNE JS POUR LES LEÇONS. RIEN D'AUTRE. 
function r(t){document.getElementById('destinReply').innerHTML=t}
</script>
</body>
</html>
