<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESTIN ACADEMIE</title>
<style>
body{margin:0;background:#0a0f1e;color:#fff;font-family:'Segoe UI';display:flex;justify-content:center;padding:20px}
.app{width:100%;max-width:500px;background:rgba(255,255,255,.06);padding:24px;border-radius:20px}
.logo{width:80px;height:80px;margin:0 auto;background:linear-gradient(45deg,#FFD700,#7F5AF0);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:900;color:#000}
h1{text-align:center;font-size:1.5rem}
input,button{width:100%;padding:14px;margin-top:10px;border-radius:12px;border:0;font-size:1rem}
button{background:#FFD700;color:#000;font-weight:700;cursor:pointer}
.hidden{display:none}
.lesson{background:rgba(0,0,0,.3);padding:14px;border-radius:12px;margin-top:10px;cursor:pointer}
#destinReply{background:rgba(127,90,240,.2);padding:14px;border-radius:12px;margin-top:12px;font-size:1.1rem;line-height:1.8}
</style>
</head>
<body>
<div class="app">
  <div id="lock">
    <div class="logo">DP</div>
    <h1>DESTIN ACADEMIE</h1>
    <input id="code" placeholder="DESTIN-001" style="text-transform:uppercase">
    <button id="btn">Activer Mon Accès</button>
    <p id="msg" style="text-align:center;margin-top:10px"></p>
  </div>

  <div id="app" class="hidden">
    <div class="logo" style="width:60px;height:60px;font-size:1.8rem">DP</div>
    <h1>Salut, je suis DESTIN ✨</h1>
    <div id="liste"></div>
    <input id="input" placeholder="Leçon 3">
    <button id="ask" style="background:#7F5AF0;color:#fff">Demander à DESTIN</button>
    <div id="destinReply">👋 Écris `Leçon 2`</div>
  </div>
</div>

<script>
// LE CODE QUI NE PLANTE JAMAIS SUR IPHONE
const CODES = ["DESTIN-001","DESTIN-002","DESTIN-003","DESTIN-004","DESTIN-005"];
const COURS = {
 2:"Imagine un robot bébé très malin 🍼. Si tu lui montres 100 chats, il apprend. Après, il dit: `Ah! C’est un chat!`",
 3:"Machine Learning = `La machine apprend` 📚. C’est comme toi à l’école. Maman te montre `A` beaucoup de fois.",
 4:"L’ordi a un `cerveau` avec plein d’ampoules 💡. Une dit `moustaches`, une autre `miaule`. Ensemble: `Chat!`",
 5:"ChatGPT c’est moi, DESTIN 😊. J’ai lu tous les livres. Je devine le prochain mot quand tu parles.",
 6:"Tu me dis `dessine un chien` 👑🐶 et POUF je dessine! J’ai vu des millions de dessins.",
 7:"Si je vois seulement des bananes jaunes 🍌, je crois que toutes sont jaunes. L’IA copie.",
 8:"Parle-moi comme à un ami. Au lieu de `fais truc`, dis `dessine un soleil jaune qui sourit`.",
 9:"Au Bénin, je peux t’aider à faire tes devoirs, écrire pour vendre, ou traduire Français <> Fon.",
 10:"L’IA ne va pas prendre ta place 🚀. Mais toi + l’IA = Tu seras le plus fort de ta classe."
};

const btn = document.getElementById('btn');
const ask = document.getElementById('ask');
const msg = document.getElementById('msg');

btn.addEventListener('click', function(){
  let code = document.getElementById('code').value.toUpperCase().trim();
  if(CODES.includes(code)){
    msg.style.color = '#69F0AE';
    msg.textContent = '✅ Code Bon! Chargement...';
    setTimeout(function(){
      document.getElementById('lock').style.display='none';
      document.getElementById('app').classList.remove('hidden');
      afficher();
    }, 300);
  } else {
    msg.style.color = '#FF5252';
    msg.textContent = '❌ Code Faux. Essaye: DESTIN-001';
  }
});

function afficher(){
  let html = '';
  for(let n in COURS){
    html += `<div class="lesson" data-n="${n}">Leçon ${n}</div>`;
  }
  document.getElementById('liste').innerHTML = html;
  
  // Pour que chaque leçon clique
  document.querySelectorAll('.lesson').forEach(el => {
    el.addEventListener('click', function(){
      let n = this.getAttribute('data-n');
      document.getElementById('destinReply').innerHTML = `<b>DESTIN ✨:</b> ${COURS[n]}`;
    });
  });
}

ask.addEventListener('click', function(){
  let q = document.getElementById('input').value.toLowerCase();
  let m = q.match(/leçon\s*(\d+)/);
  if(m && COURS[m[1]]){
    document.getElementById('destinReply').innerHTML = `<b>DESTIN ✨:</b> ${COURS[m[1]]}`;
  } else {
    document.getElementById('destinReply').innerHTML = `<b>DESTIN ✨:</b> Dis-moi `Leçon 3` 😊`;
  }
});
</script>
</body>
</html>
