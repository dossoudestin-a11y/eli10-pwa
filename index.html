<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DESTIN V20.4</title><style>body{margin:0;background:#0a0f1e;color:#fff;font-family:'Segoe UI';display:flex;justify-content:center;padding:20px}.app{width:100%;max-width:500px;background:rgba(255,255,255,.06);padding:24px;border-radius:20px}.logo{width:80px;height:80px;margin:0 auto;background:linear-gradient(45deg,#FFD700,#7F5AF0);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:900;color:#000}h1{text-align:center;font-size:1.5rem}input,button{width:100%;padding:14px;margin-top:10px;border-radius:12px;border:0;font-size:1rem}button{background:#FFD700;color:#000;font-weight:700}.hidden{display:none}.lesson{background:rgba(0,0,0,.3);padding:14px;border-radius:12px;margin-top:10px}</style></head><body><div class="app"><div id="lock"><div class="logo">DP</div><h1>DESTIN ACADEMIE V20.4</h1><input id="code" placeholder="DESTIN-001"><button id="btn">Activer</button><p id="msg" style="text-align:center"></p></div><div id="app" class="hidden"><h1>Salut, je suis DESTIN ✨</h1><div id="liste"></div><input id="input" placeholder="Leçon 3"><button id="ask" style="background:#7F5AF0;color:#fff">Demander</button><div id="destinReply" style="margin-top:12px"></div></div></div><script>const CODES=["DESTIN-001","DESTIN-002"];const COURS={2:"Robot bébé malin 🍼. Montre 100 chats, il apprend.",3:"Machine Learning = La machine apprend 📚. Comme toi à l'école."};const btn=document.getElementById('btn');btn.addEventListener('click',()=>{let c=document.getElementById('code').value.toUpperCase().trim();let m=document.getElementById('msg');if(CODES.includes(c)){m.style.color='#69F0AE';m.textContent='✅ Code Bon!';document.getElementById('lock').style.display='none';document.getElementById('app').classList.remove('hidden');let h='';for(let n in COURS){h+=`<div class="lesson" onclick="document.getElementById('destinReply').innerHTML='<b>DESTIN:</b> ${COURS[n]}'">Leçon ${n}</div>`}document.getElementById('liste').innerHTML=h}else{m.style.color='#FF5252';m.textContent='❌ Code Faux'}});document.getElementById('ask').addEventListener('click',()=>{let q=document.getElementById('input').value.toLowerCase();let m=q.match(/leçon\s*(\d+)/);document.getElementById('destinReply').innerHTML=m&&COURS[m[1]]?`<b>DESTIN:</b> ${COURS[m[1]]}`:`<b>DESTIN:</b> Dis `Leçon 2``});</script></body></html>
